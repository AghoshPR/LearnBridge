services:
  web:
    build: .
    container_name: learnbridge_backend
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 LearnBridge.asgi:application"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=host.docker.internal
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: learnbridge_redis
    ports:
      - "6379:6379"