services:
  web:
    build: .
    container_name: learnbridge_backend
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 LearnBridge.asgi:application"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis

    restart: unless-stopped

  celery:
    build: .
    container_name: learnbridge_celery
    command: celery -A LearnBridge worker -l info
    env_file:
      - .env

    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      
    depends_on:
      - redis
      - web
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: learnbridge_redis
    ports:
      - "6379:6379"
    restart: unless-stopped